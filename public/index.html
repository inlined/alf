<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase AI Logic Chat</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent-color);
            font-weight: 700;
        }

        .controls {
            display: flex;
            gap: 1.5rem;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: 600;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            overflow-y: auto;
            gap: 1rem;
            background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.05), transparent);
        }

        .message {
            max-width: 70%;
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
        }

        .message.user {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.agent {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            gap: 1rem;
            backdrop-filter: blur(10px);
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button#send {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button#send:hover {
            opacity: 0.9;
        }

        .token-note {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
            display: block;
        }

        /* Markdown Styles */
        .message p {
            margin: 0 0 0.75rem 0;
        }
        .message p:last-child {
            margin-bottom: 0;
        }
        .message code {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .message pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.75rem 0;
            border: 1px solid var(--border-color);
        }
        .message pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
            font-size: 0.875rem;
        }
        .message ul, .message ol {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }
        .message li {
            margin-bottom: 0.25rem;
        }
        .message blockquote {
            border-left: 4px solid var(--accent-color);
            margin: 0.75rem 0;
            padding-left: 1rem;
            color: #94a3b8;
        }
        .message table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.75rem 0;
        }
        .message th, .message td {
            border: 1px solid var(--border-color);
            padding: 0.5rem;
            text-align: left;
        }
        .message th {
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>AILogic Chat</h1>
        <div class="controls">
            <div class="toggle-group" id="api-toggle">
                <button class="toggle-btn active" data-value="gemini">Gemini</button>
                <button class="toggle-btn" data-value="vertex">Vertex</button>
            </div>
            <div class="toggle-group" id="scope-toggle">
                <button class="toggle-btn active" data-value="global">Global</button>
                <button class="toggle-btn" data-value="regional">Regional</button>
            </div>
        </div>
    </header>

    <div class="chat-container" id="chat-box">
        <div class="message agent">
            Hello! I am ready to chat. I'll use the selected backend and scope.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
        <button id="send">Send</button>
    </div>

    <script type="module" src="index.js"></script>
</body>

</html>
